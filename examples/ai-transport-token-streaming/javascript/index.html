<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles.css" />
    <title>AI Transport token streaming - JavaScript</title>
  </head>

  <body class="bg-gray-100">
    <div class="max-w-6xl mx-auto p-5">
      <div class="flex justify-end mt-4 mb-2">
        <button id="refresh-button" class="text-xs bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600">
          Refresh
        </button>
      </div>
      <div class="p-4 border border-gray-300 rounded-lg bg-gray-50 h-40 overflow-y-auto mb-4 text-base leading-relaxed">
        <div id="response-text" class="text-gray-400">Select the prompt below to stream a response.</div>
      </div>

      <div class="flex gap-2">
        <button
          id="prompt-button"
          disabled
          class="px-3 py-2 text-sm border rounded-md transition-colors bg-white hover:bg-blue-50 border-gray-300 hover:border-blue-300 cursor-pointer disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed disabled:border-gray-200"
        >
          What is Ably AI Transport?
        </button>
        <button
          id="stop-button"
          class="px-3 py-2 text-sm bg-blue-500 text-white rounded-md hover:bg-blue-600"
          style="display: none"
        >
          Stop
        </button>
      </div>
    </div>

    <script type="module" src="src/script.ts"></script>
  </body>
</html>
